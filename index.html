<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>マップに円</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: calc(100vh - 220px); width: 100%; border-radius: 12px; z-index: 1; }
    body { touch-action: manipulation; overflow-x: hidden; }

    /* 描画モード中はページスクロールやジェスチャの干渉を減らす */
    body.drawing-active { touch-action: none; overscroll-behavior: none; }
    body.drawing-active #map { touch-action: none; }
    .drawing-active #map { cursor: crosshair; }

    /* 円周ラベル（白い四角が小さくならない＆クリップされない） */
    .radius-marker {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      overflow: visible !important;
      pointer-events: none !important;
    }
    .radius-label {
      display: inline-block;
      background: #ffffff;              /* しっかり白 */
      border: 2px solid #2563eb;
      border-radius: 10px;
      padding: 4px 10px;               /* 大きめ */
      font-weight: 800;
      color: #1e40af;
      font-size: 14px;                 /* 読みやすく */
      line-height: 1.1;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    /* 初期化中にボタンを押されても落ちないように */
    .disabled-ui { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <header class="mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-blue-700">マップに円</h1>
        <p class="text-sm text-slate-500">任意の地点から同心円を描画・計測</p>
      </div>

      <div class="flex flex-wrap gap-2">
        <input id="searchInput" type="text" placeholder="場所を検索" class="border p-2 rounded-lg w-full md:w-48 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none" />
        <button onclick="searchLocation()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg transition shadow-md text-sm">検索</button>
        <button onclick="undoLastCircle()" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-lg transition shadow-md text-sm">1つ戻す</button>
        <button onclick="clearCircles()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-lg transition shadow-md text-sm">リセット</button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <div class="lg:col-span-1 space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border-2 border-blue-100">
          <h2 class="font-semibold mb-2 flex items-center gap-2">
            <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
            操作モード
          </h2>
          <div id="modePanel" class="grid grid-cols-2 gap-2 disabled-ui">
            <button id="modeMove" onclick="setMode('move')" class="p-2 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm">✋ 移動</button>
            <button id="modeDraw" onclick="setMode('draw')" class="p-2 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold text-sm">✏️ 描く</button>
          </div>
          <p id="initHint" class="mt-2 text-xs text-slate-500">読み込み中…</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
          <h2 class="font-semibold mb-3 border-b pb-2 text-sm">距離指定で描く</h2>
          <div class="flex gap-2">
            <input id="radiusInput" type="number" value="2" step="0.1" min="0.1" class="border p-2 rounded w-full" />
            <span class="flex items-center text-sm">km</span>
          </div>
          <button onclick="drawCircleFromCenter()" class="w-full mt-3 bg-slate-800 text-white p-2 rounded hover:bg-slate-700 transition text-sm">現在の中心に描画</button>
        </div>

        <div id="statusInfo" class="hidden p-3 bg-blue-600 text-white rounded-lg shadow-lg text-center">
          描画中: <span id="liveDistance" class="font-bold text-xl">0</span> km
        </div>

        <div id="errorBanner" class="hidden p-3 bg-red-600 text-white rounded-lg shadow-lg text-sm">
          エラー: <span id="errorText"></span>
        </div>
      </div>

      <div class="lg:col-span-3 relative">
        <div id="map" class="shadow-inner border border-slate-200"></div>
      </div>
    </div>
  </div>

  <script>
    let map;
    let mapReady = false;

    // circles は「円 + ラベル」をセットで保持
    // { circle: L.Circle, label: L.Marker }
    let circles = [];

    let tempCircle = null;
    let tempLabel = null;

    let isDrawing = false;
    let startLatLng = null;
    let currentMode = 'move';

    function showError(msg) {
      console.error(msg);
      const b = document.getElementById('errorBanner');
      const t = document.getElementById('errorText');
      if (b && t) {
        t.textContent = msg;
        b.classList.remove('hidden');
        setTimeout(() => b.classList.add('hidden'), 5000);
      }
    }

    // Leafletの各ハンドラは環境によって存在しないことがあるので安全に
    function safeDisable(handlerName) {
      if (!map) return;
      const h = map[handlerName];
      if (h && typeof h.disable === 'function') h.disable();
    }
    function safeEnable(handlerName) {
      if (!map) return;
      const h = map[handlerName];
      if (h && typeof h.enable === 'function') h.enable();
    }

    window.addEventListener('load', () => {
      try {
        if (!window.L) throw new Error('Leaflet(L)が読み込めていません');

        map = L.map('map', {
          tap: false,
          inertia: true,
        }).setView([35.6895, 139.6917], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap',
        }).addTo(map);

        // 初期化完了
        mapReady = true;
        const panel = document.getElementById('modePanel');
        const hint = document.getElementById('initHint');
        if (panel) panel.classList.remove('disabled-ui');
        if (hint) hint.textContent = '';

        // iPhoneで安定するように：Pointer Events を優先
        setupPointerDrawing();

        // 初期状態を明示
        setMode('move');

        // 簡易セルフテスト（落ちないことを確認）
        runSelfTests();
      } catch (e) {
        showError(e?.message || String(e));
      }
    });

    function setMode(mode) {
      currentMode = mode;

      // map未初期化時にボタンが押されても落ちないように（今回のエラー対策）
      if (!mapReady || !map) {
        // UIの見た目だけ先に更新しておく
        const btnMove = document.getElementById('modeMove');
        const btnDraw = document.getElementById('modeDraw');
        if (btnMove && btnDraw) {
          if (mode === 'draw') {
            btnDraw.className = "p-2 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm";
            btnMove.className = "p-2 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold text-sm";
            document.body.classList.add('drawing-active');
          } else {
            btnMove.className = "p-2 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm";
            btnDraw.className = "p-2 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold text-sm";
            document.body.classList.remove('drawing-active');
          }
        }
        return;
      }

      const btnMove = document.getElementById('modeMove');
      const btnDraw = document.getElementById('modeDraw');

      if (mode === 'draw') {
        if (btnDraw) btnDraw.className = "p-2 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm";
        if (btnMove) btnMove.className = "p-2 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold text-sm";

        safeDisable('dragging');
        safeDisable('touchZoom');
        safeDisable('doubleClickZoom');
        safeDisable('scrollWheelZoom');
        safeDisable('boxZoom');
        safeDisable('keyboard');

        document.body.classList.add('drawing-active');
      } else {
        if (btnMove) btnMove.className = "p-2 rounded-lg border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm";
        if (btnDraw) btnDraw.className = "p-2 rounded-lg border-2 border-slate-200 bg-white text-slate-600 font-bold text-sm";

        safeEnable('dragging');
        safeEnable('touchZoom');
        safeEnable('doubleClickZoom');
        safeEnable('scrollWheelZoom');
        safeEnable('boxZoom');
        safeEnable('keyboard');

        document.body.classList.remove('drawing-active');
      }
    }

    // 目的地計算（中心 + 距離(m) + 方位角(deg) → LatLng）
    function destinationPoint(lat, lng, distanceMeters, bearingDeg) {
      const R = 6371000;
      const brng = (bearingDeg * Math.PI) / 180;
      const φ1 = (lat * Math.PI) / 180;
      const λ1 = (lng * Math.PI) / 180;
      const δ = distanceMeters / R;

      const sinφ1 = Math.sin(φ1), cosφ1 = Math.cos(φ1);
      const sinδ = Math.sin(δ), cosδ = Math.cos(δ);

      const sinφ2 = sinφ1 * cosδ + cosφ1 * sinδ * Math.cos(brng);
      const φ2 = Math.asin(sinφ2);

      const y = Math.sin(brng) * sinδ * cosφ1;
      const x = cosδ - sinφ1 * sinφ2;
      const λ2 = λ1 + Math.atan2(y, x);

      return L.latLng((φ2 * 180) / Math.PI, (((λ2 * 180) / Math.PI + 540) % 360) - 180);
    }

    // 円周上（右上 45°）に固定ラベル
    function createRadiusLabel(centerLatLng, radiusMeters, text) {
      const pos = destinationPoint(centerLatLng.lat, centerLatLng.lng, radiusMeters, 45);

      const icon = L.divIcon({
        className: 'radius-marker',
        html: `<div class="radius-label">${text}</div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 0],
      });

      return L.marker(pos, { icon, interactive: false, keyboard: false }).addTo(map);
    }

    function beginDraw(latlng) {
      isDrawing = true;
      startLatLng = latlng;

      tempCircle = L.circle(startLatLng, {
        radius: 0,
        color: '#2563eb',
        fillColor: '#3b82f6',
        fillOpacity: 0.2,
        weight: 2,
      }).addTo(map);

      const status = document.getElementById('statusInfo');
      if (status) status.classList.remove('hidden');
    }

    function updateDraw(latlng) {
      if (!isDrawing || !tempCircle) return;
      const distance = map.distance(startLatLng, latlng);
      tempCircle.setRadius(distance);
      const live = document.getElementById('liveDistance');
      if (live) live.innerText = (distance / 1000).toFixed(2);
    }

    function endDraw() {
      if (!isDrawing || !tempCircle) return;

      const distance = tempCircle.getRadius();
      if (distance > 5) {
        const kmText = `${(distance / 1000).toFixed(2)} km`;

        if (tempLabel) {
          map.removeLayer(tempLabel);
          tempLabel = null;
        }

        const label = createRadiusLabel(tempCircle.getLatLng(), distance, kmText);
        circles.push({ circle: tempCircle, label });
      } else {
        map.removeLayer(tempCircle);
      }

      isDrawing = false;
      tempCircle = null;
      const status = document.getElementById('statusInfo');
      if (status) status.classList.add('hidden');
    }

    // iPhoneでの「直接描く」を安定化：Leafletのtouchイベントより Pointer Events を優先
    function setupPointerDrawing() {
      if (!map) return;
      const el = map.getContainer();
      if (!el) return;

      const supportsPointer = 'PointerEvent' in window;

      if (!supportsPointer) {
        // フォールバック（古い環境）
        map.on('mousedown touchstart', (e) => {
          if (currentMode !== 'draw' || !e.latlng) return;
          if (e.originalEvent && e.originalEvent.cancelable) e.originalEvent.preventDefault();
          beginDraw(e.latlng);
        });
        map.on('mousemove touchmove', (e) => {
          if (!isDrawing || !e.latlng) return;
          if (e.originalEvent && e.originalEvent.cancelable) e.originalEvent.preventDefault();
          updateDraw(e.latlng);
        });
        map.on('mouseup touchend touchcancel', () => endDraw());
        return;
      }

      let activePointerId = null;

      const onDown = (e) => {
        if (currentMode !== 'draw') return;
        // 2本指以上は無視（ズーム等の誤作動を避ける）
        if (e.pointerType === 'touch' && !e.isPrimary) return;

        e.preventDefault();
        activePointerId = e.pointerId;

        // iPhoneで地図外へ指が出ても追従させるため、可能ならキャプチャ
        try { el.setPointerCapture(activePointerId); } catch (_) {}

        const latlng = map.mouseEventToLatLng(e);
        beginDraw(latlng);
      };

      const onMoveInMap = (e) => {
        // map上でのmove（通常はこちら）
        if (!isDrawing) return;
        if (activePointerId !== null && e.pointerId !== activePointerId) return;
        e.preventDefault();
        const latlng = map.mouseEventToLatLng(e);
        updateDraw(latlng);
      };

      const onMoveWindow = (e) => {
        // 地図外へ指が出た時の保険（キャプチャが効かない端末向け）
        if (!isDrawing) return;
        if (activePointerId !== null && e.pointerId !== activePointerId) return;
        // 画面スクロール抑制
        if (e.cancelable) e.preventDefault();
        const latlng = map.mouseEventToLatLng(e);
        updateDraw(latlng);
      };

      const onUp = (e) => {
        if (activePointerId !== null && e.pointerId !== activePointerId) return;
        activePointerId = null;
        endDraw();
      };

      // 登録（map内）
      el.addEventListener('pointerdown', onDown, { passive: false });
      el.addEventListener('pointermove', onMoveInMap, { passive: false });

      // 登録（地図外でも追従）
      window.addEventListener('pointermove', onMoveWindow, { passive: false });
      window.addEventListener('pointerup', onUp, { passive: false });
      window.addEventListener('pointercancel', onUp, { passive: false });
    }

    function drawCircleFromCenter() {
      if (!mapReady || !map) return;
      const center = map.getCenter();
      const km = parseFloat(document.getElementById('radiusInput').value || '0');
      if (!isFinite(km) || km <= 0) return;

      const radiusInMeters = km * 1000;

      const circle = L.circle(center, {
        color: '#dc2626',
        fillColor: '#ef4444',
        fillOpacity: 0.15,
        radius: radiusInMeters,
      }).addTo(map);

      const label = createRadiusLabel(circle.getLatLng(), radiusInMeters, `${km} km`);

      circles.push({ circle, label });
      map.fitBounds(circle.getBounds());
    }

    function undoLastCircle() {
      if (!mapReady || !map) return;
      if (circles.length > 0) {
        const last = circles.pop();
        if (last.label) map.removeLayer(last.label);
        if (last.circle) map.removeLayer(last.circle);
      }
    }

    function clearCircles() {
      if (!mapReady || !map) return;
      circles.forEach((obj) => {
        if (obj.label) map.removeLayer(obj.label);
        if (obj.circle) map.removeLayer(obj.circle);
      });
      circles = [];
    }

    async function searchLocation() {
      if (!mapReady || !map) return;
      const query = document.getElementById('searchInput').value;
      if (!query) return;
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          map.setView([lat, lon], 14);
          L.marker([lat, lon]).addTo(map).bindPopup(data[0].display_name).openPopup();
        }
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchLocation();
    });

    // --- テスト（ページ内セルフチェック） ---
    function assert(cond, msg) {
      if (!cond) throw new Error('TEST FAILED: ' + msg);
    }
    function runSelfTests() {
      try {
        assert(!!map, 'map が初期化されている');
        assert(!!map.getCenter, 'Leaflet Map API が存在する');
        // dragging は環境によっては無い可能性があるので「落ちない」ことを確認
        if (map.dragging) {
          assert(typeof map.dragging.disable === 'function', 'dragging.disable が関数');
          assert(typeof map.dragging.enable === 'function', 'dragging.enable が関数');
        }
        // setMode が map 未初期化で落ちないこと（今回の修正の要点）
        const savedMap = map;
        map = undefined;
        mapReady = false;
        setMode('draw');
        setMode('move');
        map = savedMap;
        mapReady = true;
        console.log('[self-test] OK');
      } catch (e) {
        showError(e?.message || String(e));
      }
    }
  </script>
</body>
</html>
